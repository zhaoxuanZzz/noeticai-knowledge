id: litigation-risk
name: 司法风险分析
description: 分析目标企业诉讼、执行、失信等司法风险及经营连带影响。

inputs:
  - company_name
  - unified_social_credit_code

data_needs:
  - 查询近三年司法案件，区分原告、被告、案由、涉案金额、审理阶段和裁判结果
  - 查询被执行人、限制高消费、失信被执行人记录
  - 查询开庭公告、法院公告与终本案件
  - 查询与企业相关的重大合同纠纷或知识产权纠纷

outputs:
  - litigation_summary
  - enforcement_records
  - credit_risk_flags
  - case_trends
  - company_wiki_writeback_status
  - evidence_gaps

rules:
  - 不要编造案件、执行或失信数据
  - 数据缺失时输出 evidence_gaps
  - 所有结论必须说明依据字段
  - 补齐公开企业信息后必须写回企业信息库 raw/wiki，并说明写回状态
