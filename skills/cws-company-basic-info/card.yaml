id: cws-company-basic-info
name: 企业基本信息查询
description: 仅查询并回显目标企业工商登记基本信息，用于简单核对与插件联调测试。

inputs:
  - company_name
  - unified_social_credit_code

data_needs:
  - 查询企业工商基本信息，包括企业名称、统一社会信用代码、法定代表人、注册资本、成立日期、经营状态、注册地址、经营范围

outputs:
  - company_name_confirmed
  - unified_social_credit_code
  - legal_representative
  - registered_capital
  - establishment_date
  - operating_status
  - registered_address
  - business_scope
  - evidence_gaps

rules:
  - 不要编造工商数据
  - 数据缺失时输出 evidence_gaps
  - 不做行业分析、风险研判或投资建议

gate:
  handoff: required
  required_outputs:
    - company_name_confirmed
    - unified_social_credit_code
    - legal_representative
    - registered_capital
    - establishment_date
    - operating_status
    - registered_address
    - business_scope
    - evidence_gaps
  required_meta:
    - subject
    - sources
    - data_as_of
    - evidence_gaps
    - wiki_writeback
    - run_id
  artifact_checks:
    evidence_gaps:
      type: list
    company_name_confirmed:
      type: object_or_string
      non_empty: true
    operating_status:
      type: object_or_string
      non_empty: true
  behavior_checks:
    - id: no_fabricated_empty_fill
      when: missing_data
      require: evidence_gaps_non_null
    - id: data_role_no_final_report
      when: role == data
      forbid_keys: [final_report, due_diligence_report]
  semantic:
    evidence: required
    deterministic_checks:
      - claim_evidence
      - subject_identity
      - freshness_disclosure
      - source_conflict_disclosure
    required_claims:
      - artifacts.operating_status
