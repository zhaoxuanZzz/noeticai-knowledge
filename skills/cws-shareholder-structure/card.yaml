id: cws-shareholder-structure
name: 股权结构分析
description: 分析目标企业股东结构、实控人、持股链路和股权异常信号。

inputs:
  - company_name
  - unified_social_credit_code

data_needs:
  - 查询企业工商基本信息
  - 查询当前股东列表及持股比例
  - 查询历史股权变更
  - 查询实际控制人
  - 查询对外投资和关联企业

outputs:
  - shareholder_summary
  - control_chain
  - related_entities
  - risk_flags
  - evidence_gaps

rules:
  - 不要编造工商、股权或关联企业数据
  - 数据缺失时输出 evidence_gaps
  - 所有结论必须说明依据字段

gate:
  handoff: required
  required_outputs:
    - shareholder_summary
    - control_chain
    - related_entities
    - risk_flags
    - evidence_gaps
  required_meta:
    - subject
    - sources
    - data_as_of
    - evidence_gaps
    - wiki_writeback
    - run_id
  artifact_checks:
    evidence_gaps:
      type: list
    shareholder_summary:
      type: object_or_string
      non_empty: true
  behavior_checks:
    - id: no_fabricated_empty_fill
      when: missing_data
      require: evidence_gaps_non_null
    - id: data_role_no_final_report
      when: role == data
      forbid_keys: [final_report, due_diligence_report]
  semantic:
    evidence: required
    deterministic_checks:
      - claim_evidence
      - subject_identity
      - freshness_disclosure
      - source_conflict_disclosure
      - negative_claim_coverage
    required_claims:
      - artifacts.shareholder_summary.control_party
    judge:
      rubric: shareholder-structure-v1
      on_suspicious: needs_review
