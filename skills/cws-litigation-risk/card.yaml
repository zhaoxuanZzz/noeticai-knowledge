id: cws-litigation-risk
name: 司法风险分析
description: 分析目标企业诉讼、执行、失信等司法风险及经营连带影响。

inputs:
  - company_name
  - unified_social_credit_code

data_needs:
  - 查询近三年司法案件，区分原告、被告、案由、涉案金额、审理阶段和裁判结果
  - 查询被执行人、限制高消费、失信被执行人记录
  - 查询开庭公告、法院公告与终本案件
  - 查询与企业相关的重大合同纠纷或知识产权纠纷

outputs:
  - litigation_summary
  - enforcement_records
  - credit_risk_flags
  - case_trends
  - evidence_gaps

rules:
  - 不要编造案件、执行或失信数据
  - 数据缺失时输出 evidence_gaps
  - 所有结论必须说明依据字段

gate:
  handoff: required
  required_outputs:
    - litigation_summary
    - enforcement_records
    - credit_risk_flags
    - case_trends
    - evidence_gaps
  required_meta:
    - subject
    - sources
    - data_as_of
    - evidence_gaps
    - wiki_writeback
    - run_id
  artifact_checks:
    evidence_gaps:
      type: list
    litigation_summary:
      type: object_or_string
      non_empty: true
  behavior_checks:
    - id: no_fabricated_empty_fill
      when: missing_data
      require: evidence_gaps_non_null
    - id: data_role_no_final_report
      when: role == data
      forbid_keys: [final_report, due_diligence_report]
  semantic:
    evidence: required
    deterministic_checks:
      - claim_evidence
      - subject_identity
      - freshness_disclosure
      - source_conflict_disclosure
      - negative_claim_coverage
    required_claims:
      - artifacts.litigation_summary.overview
    judge:
      rubric: litigation-risk-v1
      on_suspicious: needs_review
