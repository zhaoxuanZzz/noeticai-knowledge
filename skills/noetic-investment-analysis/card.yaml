id: noetic-investment-analysis-report
name: 投资分析
description: 汇总企业画像、股权结构、司法风险和融资历史，生成投资研判报告。

inputs:
  - company_profile
  - shareholder_structure
  - litigation_risk
  - financing_history

outputs:
  - target_overview
  - governance_assessment
  - risk_assessment
  - financing_and_valuation_signals
  - investment_view
  - evidence_gaps

rules:
  - 不要编造工商、司法、股权、融资、估值或投资结论
  - 缺失信息必须进入 evidence_gaps
  - 所有判断必须能追溯到前置产物或用户提供资料
  - 如果前置产物缺失，先执行 references/workflow.yaml 的对应阶段

gate:
  handoff: required
  final:
    require_parent_artifacts: [company_profile, shareholder_structure, litigation_risk, financing_history]
    require_report_handoff: true
